compute_environment: LOCAL_MACHINE
debug: false
distributed_type: NO
enable_cpu_affinity: false
downcast_bf16: 'no'
# Set to specific GPU ID for my local machine (RTX 3090)
gpu_ids: '0'
machine_rank: 0
main_training_function: main
mixed_precision: 'bf16'
num_machines: 1
num_processes: 1
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
# Note: set mixed_precision to 'no' if experiencing NaN losses during training
# mixed_precision: 'no'
# Note: set debug: true to get more verbose logging when troubleshooting
# hangs or unexpected behavior during training runs
